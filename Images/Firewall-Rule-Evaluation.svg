<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="640" fill="#ffffff"/>

  <text x="450" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">Firewall Rules: First Match Wins</text>
  <text x="450" y="60" text-anchor="middle" font-size="13.5" fill="#475569">A packet is checked top to bottom. The first rule it matches decides its fate; nothing below runs.</text>

  <text x="350" y="96" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">Incoming packet (VLAN 20 or VLAN 10 traffic)</text>
  <line x1="350" y1="102" x2="350" y2="114" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- Rule 1 -->
  <rect x="160" y="116" width="380" height="68" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.6"/>
  <text x="180" y="146" font-size="14" font-weight="700" fill="#334155">Rule 1 - Accept established / related</text>
  <text x="180" y="167" font-size="12" fill="#64748b">part of a conversation already approved (incl. replies)</text>
  <line x1="540" y1="150" x2="598" y2="150" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="600" y="128" width="250" height="44" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="725" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">ACCEPT</text>

  <line x1="350" y1="184" x2="350" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="366" y="211" font-size="11.5" fill="#94a3b8">no match, next rule</text>

  <!-- Rule 2 -->
  <rect x="160" y="232" width="380" height="68" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.6"/>
  <text x="180" y="262" font-size="14" font-weight="700" fill="#334155">Rule 2 - Accept AD services (TCP)</text>
  <text x="180" y="283" font-size="12" fill="#64748b">from VLAN 20 to VLAN 10, TCP AD ports</text>
  <line x1="540" y1="266" x2="598" y2="266" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="600" y="244" width="250" height="44" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="725" y="271" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">ACCEPT</text>

  <line x1="350" y1="300" x2="350" y2="346" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="366" y="327" font-size="11.5" fill="#94a3b8">no match, next rule</text>

  <!-- Rule 3 -->
  <rect x="160" y="348" width="380" height="68" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.6"/>
  <text x="180" y="378" font-size="14" font-weight="700" fill="#334155">Rule 3 - Accept AD services (UDP)</text>
  <text x="180" y="399" font-size="12" fill="#64748b">from VLAN 20 to VLAN 10, UDP AD ports</text>
  <line x1="540" y1="382" x2="598" y2="382" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="600" y="360" width="250" height="44" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="725" y="387" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">ACCEPT</text>

  <line x1="350" y1="416" x2="350" y2="462" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="366" y="443" font-size="11.5" fill="#94a3b8">no match, next rule</text>

  <!-- Rule 4 -->
  <rect x="160" y="464" width="380" height="68" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6"/>
  <text x="180" y="494" font-size="14" font-weight="700" fill="#991b1b">Rule 4 - Drop everything else</text>
  <text x="180" y="515" font-size="12" fill="#b91c1c">from VLAN 20 to VLAN 10, any port (the default-deny floor)</text>
  <line x1="540" y1="498" x2="598" y2="498" stroke="#dc2626" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="600" y="476" width="250" height="44" rx="22" fill="#fee2e2" stroke="#dc2626" stroke-width="1.8"/>
  <text x="725" y="503" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">DROP</text>

  <!-- examples -->
  <rect x="50" y="556" width="800" height="70" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <circle cx="70" cy="582" r="6" fill="#16a34a"/>
  <text x="86" y="587" font-size="12.5" fill="#334155"><tspan font-weight="700">Example A</tspan> - LDAP query (TCP 389): skips rule 1, matches rule 2, and is ACCEPTED.</text>
  <circle cx="70" cy="608" r="6" fill="#dc2626"/>
  <text x="86" y="613" font-size="12.5" fill="#334155"><tspan font-weight="700">Example B</tspan> - Ping (ICMP): matches no allow rule, falls through to rule 4, and is DROPPED.</text>
</svg>
