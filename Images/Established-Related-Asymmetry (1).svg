<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="gg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="rr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="540" fill="#ffffff"/>

  <text x="450" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">Why "Established / Related" Matters</text>
  <text x="450" y="60" text-anchor="middle" font-size="13.5" fill="#475569">Clients start conversations. Servers may reply. Servers can never start one into client-land.</text>

  <!-- client box -->
  <rect x="40" y="120" width="180" height="300" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="130" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">Clients</text>
  <text x="130" y="171" text-anchor="middle" font-size="12" fill="#166534">VLAN 20</text>

  <!-- server box -->
  <rect x="680" y="120" width="180" height="300" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
  <text x="770" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Servers</text>
  <text x="770" y="171" text-anchor="middle" font-size="12" fill="#1d4ed8">VLAN 10</text>

  <!-- firewall wall -->
  <rect x="440" y="110" width="24" height="320" rx="4" fill="#e2e8f0" stroke="#64748b" stroke-width="1.3"/>
  <text x="452" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#475569" transform="rotate(-90 452 270)">FIREWALL</text>

  <!-- 1: client to server, allowed -->
  <line x1="222" y1="215" x2="678" y2="215" stroke="#16a34a" stroke-width="2.4" marker-end="url(#gg)"/>
  <text x="450" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">1. Client sends a new request</text>
  <text x="450" y="235" text-anchor="middle" font-size="11" fill="#16a34a">allowed by the AD-port rule; firewall records the conversation</text>

  <!-- 2: server to client reply, allowed -->
  <line x1="678" y1="290" x2="222" y2="290" stroke="#16a34a" stroke-width="2.4" marker-end="url(#gg)"/>
  <text x="450" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">2. Server's reply returns</text>
  <text x="450" y="310" text-anchor="middle" font-size="11" fill="#16a34a">allowed by the "established / related" rule (it recognizes the reply)</text>

  <!-- 3: server initiates, blocked at wall -->
  <line x1="678" y1="370" x2="470" y2="370" stroke="#dc2626" stroke-width="2.4" marker-end="url(#rr)"/>
  <line x1="436" y1="356" x2="452" y2="384" stroke="#dc2626" stroke-width="3"/>
  <line x1="452" y1="356" x2="436" y2="384" stroke="#dc2626" stroke-width="3"/>
  <text x="590" y="356" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">3. Server tries to start</text>
  <text x="590" y="392" text-anchor="middle" font-size="11" fill="#dc2626">no matching rule, so it is DROPPED at the wall</text>

  <!-- summary -->
  <rect x="40" y="448" width="820" height="72" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="450" y="476" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">The asymmetry you get for free:</text>
  <text x="450" y="500" text-anchor="middle" font-size="12.5" fill="#475569">Because the rule only allows replies to conversations the client started, the server can answer all day</text>
  <text x="450" y="517" text-anchor="middle" font-size="12.5" fill="#475569">but can never reach into client-land uninvited. That is least privilege, enforced at the network layer.</text>
</svg>
